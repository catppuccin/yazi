current = { fg = "#eff1f5", bg = "#df8e1d" }
preview = { fg = "#eff1f5", bg = "#4c4f69" }

[status]
sep_left  = { open = "¯éÂ", close = "¯é┤" }
sep_right = { open = "¯éÂ", close = "¯é┤" }

