title    = {}
value    = {}
selected = { reversed = true }

[pick]
border   = { fg = "#df8e1d" }
active   = { fg = "#ea76cb" }
inactive = {}

[confirm]
border     = { fg = "#df8e1d" }
title      = { fg = "#df8e1d" }
body       = {}
list       = {}
btn_yes    = { reversed = true }
btn_no     = {}

[cmp]
border = { fg = "#df8e1d" }

[tasks]
border  = { fg = "#df8e1d" }
title   = {}
